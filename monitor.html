<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Antrian Pegadaian - Stabil</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial; background: #007d3a; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .video-section { flex: 6; background: black; }
        .queue-section { flex: 4; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; color: #333; border-left: 5px solid #ddd; }
        h1 { font-size: 10rem; margin: 0; color: #007d3a; font-weight: bold; }
        h2 { font-size: 3rem; color: #666; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center; }
        .btn-start { border: 4px solid white; padding: 30px; border-radius: 20px; font-size: 2rem; background: #007d3a; }
    </style>
</head>
<body>

    <div id="overlay" onclick="aktifkanMonitor()">
        <div class="btn-start">KLIK DI SINI UNTUK<br>MULAI MONITOR</div>
    </div>

    <div class="container">
        <div class="video-section">
            <iframe id="layarYouTube" width="100%" height="100%" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="queue-section">
            <h2>NOMOR ANTRIAN</h2>
            <h1 id="nomorBesar">---</h1>
            <h3 id="namaNasabah" style="font-size: 2rem;">Menunggu...</h3>
        </div>
    </div>

    <script>
        // --- ATUR DI SINI ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxr54D2wJB7Lp9Nx9au126J82orMSzEqOYjPAFc1XnprHUlmQ9h47eg3mzYkP0fXayr/exec';
        
        // Gunakan ID video robot Google untuk tes: tgbNymZ7vqY
        // Jika berhasil, ganti dengan ID video Pegadaian pilihan Anda
        const videoID = 'tgbNymZ7vqY'; 
        // -------------------

        let nomorTerakhir = "";

        function aktifkanMonitor() {
            document.getElementById('overlay').style.display = 'none';
            // Panggil YouTube hanya setelah user melakukan klik
            const embedUrl = `https://www.youtube.com/embed/${videoID}?autoplay=1&mute=1&loop=1&playlist=${videoID}&rel=0&controls=0`;
            document.getElementById('layarYouTube').src = embedUrl;
            
            setInterval(ambilData, 5000); // Update data setiap 5 detik
        }

        function ambilData() {
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                // Mencari status "Dipanggil" di kolom ke-3 (index 2)
                let antrian = data.slice().reverse().find(row => row[2] === "Dipanggil");
                if (antrian && antrian[1] !== nomorTerakhir) {
                    nomorTerakhir = antrian[1];
                    document.getElementById('nomorBesar').innerText = antrian[1];
                    document.getElementById('namaNasabah').innerText = antrian[0];
                    panggilSuara(antrian[1]);
                }
            })
            .catch(e => console.log("Gagal ambil data Sheets"));
        }

        function panggilSuara(nomor) {
            let msg = new SpeechSynthesisUtterance("Nomor antrian " + nomor + ", silakan menuju loket pelayanan");
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
